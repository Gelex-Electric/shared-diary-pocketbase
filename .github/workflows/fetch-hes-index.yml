name: Fetch HES Index (daily)

on:
  schedule:
    - cron: "5 17 * * *"   # 00:05 gio VN (17:05 UTC hom truoc) -> tinh cho hom qua tron ven
  workflow_dispatch:        # chay thu cong / backfill
    inputs:
      target_date:
        description: "De trong = hom qua | 'YYYY-MM-DD' = dung ngay | so N = lui N ngay (vd 32). Dau ky = D 00:00, cuoi ky = D+1 00:00."
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: fetch-hes-index
  cancel-in-progress: false

jobs:
  hes-index:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TZ: Asia/Ho_Chi_Minh   # toan bo job chay theo gio VN (UTC+7)
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install --quiet requests

      - name: Fetch HES dau/cuoi ky
        env:
          API_USER: ${{ secrets.API_USER }}
          API_PASS: ${{ secrets.API_PASS }}
          TARGET_DATE: ${{ inputs.target_date }}
        run: python scripts/fetch_hes_index.py

      - name: Commit & push CSV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/hes_index_daily.csv
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update HES daily index $(date +'%Y-%m-%d %H:%M ICT')"
            git pull --rebase origin ${{ github.ref_name }}
            git push
          fi
