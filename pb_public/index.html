<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Đăng nhập - Sổ nhật ký vận hành</title>
  <script src="https://cdn.jsdelivr.net/npm/pocketbase@0.21.3/dist/pocketbase.umd.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: linear-gradient(135deg, #f1f5f9 0%, #e0f2fe 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .login-card:hover {
      transform: translateY(-10px);
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
    }
    input:focus {
      outline: none;
      box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.25);
      border-color: #10b981;
    }
  </style>
</head>
<body class="font-sans antialiased">

  <div class="login-card w-full max-w-md bg-white rounded-3xl shadow-2xl p-10 mx-4">
    <div class="text-center mb-10">
      <div class="text-6xl mb-4">📋</div>
      <h1 class="text-3xl font-bold text-gray-800">Sổ nhật ký vận hành điện tử</h1>
      <p class="text-gray-500 mt-2">Hệ thống bàn giao ca trực</p>
    </div>

    <form id="loginForm" class="space-y-6">
      <div>
        <input id="username" type="text" autocomplete="username"
               placeholder="Tên đăng nhập" required
               class="w-full bg-gray-50 border border-gray-300 px-5 py-4 rounded-2xl text-lg focus:border-emerald-500 transition">
      </div>

      <div>
        <input id="password" type="password" autocomplete="current-password"
               placeholder="Mật khẩu" required
               class="w-full bg-gray-50 border border-gray-300 px-5 py-4 rounded-2xl text-lg focus:border-emerald-500 transition">
      </div>

      <button type="submit"
              class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-medium text-lg py-4 rounded-2xl transition shadow-md">
        Đăng nhập
      </button>
    </form>

    <p class="text-center text-gray-500 text-sm mt-8">
      Chỉ dành cho thành viên nhóm vận hành
    </p>
  </div>

  <script>
    const pb = new PocketBase('https://getc.up.railway.app');

    document.getElementById('loginForm').addEventListener('submit', async e => {
      e.preventDefault();
      const btn = e.target.querySelector('button');
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !password) {
        alert('Vui lòng nhập đầy đủ thông tin!');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Đang đăng nhập...';

      try {
        await pb.collection('users').authWithPassword(username, password);
        window.location.href = 'handover.html';
      } catch (err) {
        alert(err?.message?.includes('Invalid') ? 'Tên đăng nhập hoặc mật khẩu không đúng!' : 'Có lỗi xảy ra, vui lòng thử lại.');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Đăng nhập';
      }
    });
  </script>
</body>
</html>
