<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Handover Log</title>
    <script src="https://cdn.jsdelivr.net/npm/pocketbase@0.21.3/dist/pocketbase.umd.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen flex items-center justify-center">
    <div class="w-full max-w-md bg-slate-900 p-10 rounded-3xl">
        <h1 class="text-4xl font-bold text-center mb-8">📋 Handover Log</h1>
        
        <div class="space-y-6">
            <input id="username" placeholder="Tên đăng nhập" class="w-full bg-slate-800 p-4 rounded-2xl text-lg">
            <input id="password" type="password" placeholder="Mật khẩu" class="w-full bg-slate-800 p-4 rounded-2xl text-lg">
            
            <div class="flex gap-4">
                <button onclick="register()" class="flex-1 bg-slate-700 hover:bg-slate-600 py-4 rounded-2xl font-medium">Đăng ký</button>
                <button onclick="login()" class="flex-1 bg-emerald-600 hover:bg-emerald-700 py-4 rounded-2xl font-medium">Đăng nhập</button>
            </div>
        </div>

        <p class="text-center text-slate-400 mt-8 text-sm">Chỉ thành viên nhóm mới được truy cập</p>
    </div>

    <script>
        const pb = new PocketBase('https://shared-diary-pocketbase-production.up.railway.app');

        async function register() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            if (!username || !password) return alert("Vui lòng điền đầy đủ!");

            const email = username + "@nhatkychung.local";
            try {
                await pb.collection('users').create({ username, email, password, passwordConfirm: password });
                alert("✅ Đăng ký thành công! Hãy đăng nhập.");
            } catch(e) { alert("Lỗi: " + e.message); }
        }

        async function login() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            try {
                await pb.collection('users').authWithPassword(username, password);
                window.location.href = '/handover.html'; // Chuyển sang trang chính
            } catch(e) {
                alert("❌ Sai tên đăng nhập hoặc mật khẩu!");
            }
        }
    </script>
</body>
</html>
