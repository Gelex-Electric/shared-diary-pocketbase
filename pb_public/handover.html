<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sổ nhật ký vận hành điện tử</title>
    <script src="https://cdn.jsdelivr.net/npm/pocketbase@0.21.3/dist/pocketbase.umd.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        /* === CSS COMPONENT (chỉ thay đổi đoạn này) === */
        .entry-card {
            transition: background-color 0.3s ease;
            cursor: pointer;
            border: 3px solid transparent;
        }

        /* Hover: chỉ đổi màu nền, giữ nguyên vị trí */
        .entry-card:hover {
            background-color: #f1f5f9;   /* Màu xám nhạt dễ nhìn */
            border-color: inherit;
        }

        /* Click nhẹ (tùy chọn, bạn có thể xóa nếu không thích) */
        .entry-card:active {
            background-color: #e2e8f0;
        }

        /* Màu viền + nền card theo Khu công nghiệp (giữ nguyên) */
        .card-KCN-Tiền-Hải       { background-color: #f0fdf4; border-color: #16a34a; }
        .card-KCN-Phong-Diền     { background-color: #eff6ff; border-color: #3b82f6; }
        .card-KCN-Thuận-Thành-I  { background-color: #fefce8; border-color: #f59e0b; }
        .card-KCN-Yên-Mỹ         { background-color: #fef2f2; border-color: #ef4444; }
        .card-KCN-số-3           { background-color: #f5f3ff; border-color: #8b5cf6; }

        /* Màu tên KCN (giữ nguyên) */
        .kcn-KCN-Tiền-Hải       { background-color: #dcfce7; color: #166534; }
        .kcn-KCN-Phong-Diền     { background-color: #dbeafe; color: #1e40af; }
        .kcn-KCN-Thuận-Thành-I  { background-color: #fef3c7; color: #92400e; }
        .kcn-KCN-Yên-Mỹ         { background-color: #fee2e2; color: #991b1b; }
        .kcn-KCN-số-3           { background-color: #f3e8ff; color: #6b21a8; }

        .scroll-list { max-height: calc(100vh - 380px); overflow-y: auto; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">
    <div class="max-w-7xl mx-auto p-6">
        <!-- Header -->
        <div class="flex justify-between items-center mb-8 bg-white shadow rounded-3xl p-6">
            <h1 class="text-4xl font-bold text-gray-800">📋 Sổ nhật ký vận hành điện tử</h1>
            <div class="flex items-center gap-4">
                <button onclick="refreshList()" class="bg-gray-200 hover:bg-gray-300 px-6 py-3 rounded-2xl">🔄 Refresh</button>
                <button onclick="logout()" class="bg-red-500 hover:bg-red-600 px-8 py-3 rounded-2xl font-medium text-white">Đăng xuất</button>
            </div>
        </div>

        <!-- BLOCK 1: Nút thêm + Bộ lọc -->
        <div class="bg-white shadow rounded-3xl p-8 mb-8 flex flex-wrap gap-6 items-end">
            <button onclick="openCreateModal()" class="bg-emerald-500 hover:bg-emerald-600 px-10 py-5 rounded-3xl text-xl font-medium text-white flex items-center gap-3">
                ✨ Thêm lịch trực vận hành mới
            </button>

            <div class="flex-1 grid grid-cols-1 md:grid-cols-3 gap-6">
                <div>
                    <label class="block text-sm text-gray-600 mb-2">Khu vực</label>
                    <select id="filterArea" onchange="applyFilter()" class="w-full bg-gray-100 border border-gray-300 p-4 rounded-2xl text-lg focus:outline-none focus:ring-2 focus:ring-emerald-400">
                        <option value="">Tất cả khu vực</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm text-gray-600 mb-2">Thời gian</label>
                    <input type="date" id="filterDate" onchange="applyFilter()" class="w-full bg-gray-100 border border-gray-300 p-4 rounded-2xl text-lg focus:outline-none focus:ring-2 focus:ring-emerald-400">
                </div>
            </div>
        </div>

        <!-- BLOCK 2: Danh sách -->
        <div id="logs" class="scroll-list space-y-4"></div>
    </div>

    <!-- MODAL CHI TIẾT -->
    <div id="detailModal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50">
        <div class="bg-white p-8 rounded-3xl w-full max-w-4xl mx-4 max-h-[95vh] overflow-auto shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-bold text-gray-800">Chi tiết bàn giao</h3>
                <button onclick="closeDetailModal()" class="text-gray-500 hover:text-gray-700 text-2xl">×</button>
            </div>
            <div id="detailContent" class="space-y-6"></div>
        </div>
    </div>

    <!-- MODAL TẠO / SỬA -->
    <div id="modal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50">
        <div class="bg-white p-8 rounded-3xl w-full max-w-4xl mx-4 max-h-[95vh] overflow-auto shadow-2xl">
            <h3 id="modalTitle" class="text-2xl font-bold mb-6 text-gray-800">✍️ Tạo bàn giao mới</h3>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <input id="date" type="date" class="bg-gray-100 border border-gray-300 p-4 rounded-2xl focus:outline-none focus:ring-2 focus:ring-emerald-400">
                <select id="area" class="bg-gray-100 border border-gray-300 p-4 rounded-2xl text-lg focus:outline-none focus:ring-2 focus:ring-emerald-400"></select>
                <select id="shift" class="bg-gray-100 border border-gray-300 p-4 rounded-2xl focus:outline-none focus:ring-2 focus:ring-emerald-400">
                    <option value="Ca 1">Ca 1</option>
                    <option value="Ca 2">Ca 2</option>
                    <option value="Ca 3">Ca 3</option>
                </select>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mt-6">
                <input id="main_duty" placeholder="Trực chính" class="bg-gray-100 border border-gray-300 p-4 rounded-2xl focus:outline-none focus:ring-2 focus:ring-emerald-400">
                <input id="sub_duty" placeholder="Trực phụ" class="bg-gray-100 border border-gray-300 p-4 rounded-2xl focus:outline-none focus:ring-2 focus:ring-emerald-400">
                <input id="main_power" placeholder="Trực chính điện lực" class="bg-gray-100 border border-gray-300 p-4 rounded-2xl focus:outline-none focus:ring-2 focus:ring-emerald-400">
                <input id="sub_power" placeholder="Trực phụ điện lực" class="bg-gray-100 border border-gray-300 p-4 rounded-2xl focus:outline-none focus:ring-2 focus:ring-emerald-400">
            </div>

            <textarea id="notes" placeholder="Lưu ý" rows="2" class="w-full mt-6 bg-gray-100 border border-gray-300 p-6 rounded-3xl focus:outline-none focus:ring-2 focus:ring-emerald-400"></textarea>
            <textarea id="equipment" placeholder="Trang bị" rows="2" class="w-full mt-4 bg-gray-100 border border-gray-300 p-6 rounded-3xl focus:outline-none focus:ring-2 focus:ring-emerald-400"></textarea>
            <textarea id="opinions" placeholder="Ý kiến" rows="2" class="w-full mt-4 bg-gray-100 border border-gray-300 p-6 rounded-3xl focus:outline-none focus:ring-2 focus:ring-emerald-400"></textarea>

            <div class="mt-8">
                <div class="flex justify-between mb-3">
                    <h4 class="font-semibold text-gray-700">Tình hình trong ca</h4>
                    <button onclick="addSituationRow()" class="text-emerald-600 hover:text-emerald-700 text-sm">+ Thêm dòng</button>
                </div>
                <table id="situationTable" class="w-full text-sm border-collapse">
                    <thead><tr class="text-left bg-gray-100"><th class="p-3">Thời gian</th><th class="p-3">Nội dung</th><th class="w-10"></th></tr></thead>
                    <tbody id="situationBody" class="bg-white"></tbody>
                </table>
            </div>

            <div class="flex gap-4 mt-10">
                <button onclick="closeModal()" class="flex-1 bg-gray-300 hover:bg-gray-400 py-5 rounded-3xl text-gray-800">Hủy</button>
                <button onclick="saveLog()" id="saveBtn" class="flex-1 bg-emerald-500 hover:bg-emerald-600 py-5 rounded-3xl font-medium text-white">Lưu bàn giao</button>
            </div>
        </div>
    </div>

    <script>
        const pb = new PocketBase('https://getc.up.railway.app');
        let currentEditId = null;
        let currentFilter = { area: '', date: '' };
        let situationRows = [];

        const areas = ['KCN Tiền Hải', 'KCN Phong Điền', 'KCN Thuận Thành I', 'KCN Yên Mỹ', 'KCN số 3'];

        if (!pb.authStore.isValid) window.location.href = '/';

        pb.collection('handovers').subscribe('*', () => loadLogs());

        function renderAreaOptions() {
            const filterSelect = document.getElementById('filterArea');
            filterSelect.innerHTML = '<option value="">Tất cả khu vực</option>';
            areas.forEach(kcn => {
                const opt = document.createElement('option');
                opt.value = kcn; opt.textContent = kcn;
                filterSelect.appendChild(opt);
            });

            const modalSelect = document.getElementById('area');
            modalSelect.innerHTML = '';
            areas.forEach(kcn => {
                const opt = document.createElement('option');
                opt.value = kcn; opt.textContent = kcn;
                modalSelect.appendChild(opt);
            });
        }

async function loadLogs() {
    const filterParts = [];
    if (currentFilter.area) filterParts.push(`area = '${currentFilter.area.replace(/'/g, "\\'")}'`);
    if (currentFilter.date) filterParts.push(`date = '${currentFilter.date}'`);

    const options = {
        sort: '-date',
        ...(filterParts.length > 0 && { filter: filterParts.join(' && ') })
    };

    try {
        const records = await pb.collection('handovers').getFullList(options);
        let html = '';

        records.forEach(r => {
            const safeClass = r.area ? r.area.replace(/\s+/g, '-') : 'KCN-Tien-Hai';
            const cardClass = `card-${safeClass}`;
            const areaClass = `kcn-${safeClass}`;

            html += `
            <div class="entry-card shadow rounded-3xl p-6 flex justify-between items-center ${cardClass}"
                 onclick="showDetail('${r.id}')">
                <div class="flex items-center gap-6 flex-1">
                    <div class="px-5 py-3 rounded-lg font-bold text-lg ${areaClass}">
                        ${r.area || 'Chưa có khu vực'}
                    </div>
                    <div class="text-gray-700 flex-1 text-sm">
                        Trực chính: <span class="font-medium">${r.main_duty || '-'}</span><br>
                        Trực phụ: <span class="font-medium">${r.sub_duty || '-'}</span><br>
                        Trực chính điện lực: <span class="font-medium">${r.main_power || '-'}</span><br>
                        Trực phụ điện lực: <span class="font-medium">${r.sub_power || '-'}</span>
                    </div>
                </div>
            </div>`;
        });

        document.getElementById('logs').innerHTML = html || 
            '<p class="text-center py-20 text-gray-500">Chưa có bản ghi nào. Hãy tạo cái đầu tiên!</p>';
    } catch (err) {
        console.error('Lỗi loadLogs:', err);
        if (err.status !== 0) {
            document.getElementById('logs').innerHTML = `<p class="text-center py-20 text-red-600">Lỗi tải dữ liệu</p>`;
        }
    }
}

function showDetail(id) {
    pb.collection('handovers').getOne(id).then(r => {
        const situationsHTML = (r.situations || []).map(s => `
            <tr class="border-b border-gray-200">
                <td class="p-3 text-emerald-600 font-medium">${s.time || '--:--'}</td>
                <td class="p-3">${s.content || ''}</td>
            </tr>`).join('');

        const html = `
            <div class="space-y-6">
                <div class="flex justify-between">
                    <div>
                        <div class="text-3xl font-bold text-gray-800">${r.area} - ${r.shift}</div>
                        <div class="text-xl text-gray-600 mt-1">${r.date ? new Date(r.date).toLocaleDateString('vi-VN') : ''}</div>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-6 text-lg">
                    <div><strong>Trực chính:</strong> ${r.main_duty || '-'}</div>
                    <div><strong>Trực phụ:</strong> ${r.sub_duty || '-'}</div>
                    <div><strong>Trực chính điện lực:</strong> ${r.main_power || '-'}</div>
                    <div><strong>Trực phụ điện lực:</strong> ${r.sub_power || '-'}</div>
                </div>

                ${situationsHTML ? `
                <div>
                    <h4 class="font-semibold text-gray-700 mb-2">Tình hình trong ca</h4>
                    <table class="w-full text-sm border-collapse">${situationsHTML}</table>
                </div>` : ''}

                ${r.notes ? `<div><strong>Lưu ý:</strong> ${r.notes}</div>` : ''}
                ${r.equipment ? `<div><strong>Trang bị:</strong> ${r.equipment}</div>` : ''}
                ${r.opinions ? `<div><strong>Ý kiến lãnh đạo:</strong> ${r.opinions}</div>` : ''}

                <div class="flex gap-3 mt-8">
                    <button onclick="exportToPDF('${r.id}')" 
                            class="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl font-medium">
                        📄 Xuất PDF theo mẫu
                    </button>
                    <button onclick="editLog('${r.id}'); closeDetailModal()" 
                            class="flex-1 bg-blue-500 hover:bg-blue-600 text-white py-4 rounded-2xl">
                        ✏️ Sửa
                    </button>
                    <button onclick="deleteLog('${r.id}'); closeDetailModal()" 
                            class="flex-1 bg-red-500 hover:bg-red-600 text-white py-4 rounded-2xl">
                        🗑️ Xóa
                    </button>
                </div>
            </div>`;

        document.getElementById('detailContent').innerHTML = html;
        document.getElementById('detailModal').classList.remove('hidden');
    }).catch(() => alert('Không tìm thấy bản ghi!'));
}

        function closeDetailModal() {
            document.getElementById('detailModal').classList.add('hidden');
        }

        function applyFilter() {
            currentFilter.area = document.getElementById('filterArea').value;
            currentFilter.date = document.getElementById('filterDate').value;
            loadLogs();
        }

        function openCreateModal() {
            currentEditId = null;
            document.getElementById('modalTitle').textContent = '✍️ Tạo bàn giao mới';
            document.getElementById('saveBtn').textContent = 'Lưu bàn giao';
            clearModal();
            document.getElementById('modal').classList.remove('hidden');
        }

        function clearModal() {
            document.getElementById('date').value = '';
            document.getElementById('area').value = areas[0];
            document.getElementById('shift').value = 'Ca 1';
            document.getElementById('main_duty').value = '';
            document.getElementById('sub_duty').value = '';
            document.getElementById('main_power').value = '';
            document.getElementById('sub_power').value = '';
            document.getElementById('notes').value = '';
            document.getElementById('equipment').value = '';
            document.getElementById('opinions').value = '';
            situationRows = [];
            renderSituationTable();
        }

function renderSituationTable() {
    const tbody = document.getElementById('situationBody');
    tbody.innerHTML = '';
    situationRows.forEach((row, i) => {
        tbody.innerHTML += `
            <tr>
                <td>
                    <input type="time" 
                           value="${row.time || ''}" 
                           onchange="situationRows[${i}].time = this.value" 
                           class="bg-gray-100 border border-gray-300 p-2 rounded w-full">
                </td>
                <td>
                    <input type="text" 
                           value="${row.content || ''}" 
                           onchange="situationRows[${i}].content = this.value" 
                           class="bg-gray-100 border border-gray-300 p-2 rounded w-full">
                </td>
                <td>
                    <button onclick="removeSituationRow(${i})" 
                            class="text-red-600 hover:text-red-800 text-xl">×</button>
                </td>
            </tr>`;
    });
}

        function addSituationRow() {
            situationRows.push({ time: '', content: '' });
            renderSituationTable();
        }

        function removeSituationRow(i) {
            situationRows.splice(i, 1);
            renderSituationTable();
        }

        async function saveLog() {
            const data = {
                date: document.getElementById('date').value,
                area: document.getElementById('area').value,
                shift: document.getElementById('shift').value,
                main_duty: document.getElementById('main_duty').value,
                sub_duty: document.getElementById('sub_duty').value,
                main_power: document.getElementById('main_power').value,
                sub_power: document.getElementById('sub_power').value,
                notes: document.getElementById('notes').value,
                equipment: document.getElementById('equipment').value,
                opinions: document.getElementById('opinions').value,
                situations: situationRows
            };

            if (!data.date || !data.main_duty) return alert('Vui lòng nhập Ngày và Trực chính!');

            try {
                if (currentEditId) {
                    await pb.collection('handovers').update(currentEditId, data);
                    alert('✅ Đã cập nhật!');
                } else {
                    await pb.collection('handovers').create(data);
                    alert('✅ Đã tạo bàn giao mới!');
                }
                closeModal();
                loadLogs();
            } catch (err) {
                alert('❌ Lỗi: ' + (err.message || 'Kiểm tra console'));
            }
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
        }

function editLog(id) {
    currentEditId = id;
    document.getElementById('modalTitle').textContent = '✏️ Chỉnh sửa bàn giao';
    document.getElementById('saveBtn').textContent = 'Lưu thay đổi';

    pb.collection('handovers').getOne(id).then(r => {
        // Giữ nguyên ngày cũ khi sửa (không reset về hôm nay)
        document.getElementById('date').value = r.date || '';
        document.getElementById('area').value = r.area || areas[0];
        document.getElementById('shift').value = r.shift || 'Ca 1';
        document.getElementById('main_duty').value = r.main_duty || '';
        document.getElementById('sub_duty').value = r.sub_duty || '';
        document.getElementById('main_power').value = r.main_power || '';
        document.getElementById('sub_power').value = r.sub_power || '';
        document.getElementById('notes').value = r.notes || '';
        document.getElementById('equipment').value = r.equipment || '';
        document.getElementById('opinions').value = r.opinions || '';

        situationRows = r.situations || [];
        renderSituationTable();
        document.getElementById('modal').classList.remove('hidden');
    }).catch(() => alert('Không tìm thấy bản ghi!'));
}

        async function deleteLog(id) {
            if (!confirm('Xác nhận xóa bản ghi này?')) return;
            try {
                await pb.collection('handovers').delete(id);
                loadLogs();
                alert('🗑️ Đã xóa!');
            } catch (err) {
                alert('❌ Không thể xóa: ' + err.message);
            }
        }

        function refreshList() { loadLogs(); }

        function logout() {
            pb.collection('handovers').unsubscribe();
            pb.authStore.clear();
            window.location.href = '/';
        }

        window.onload = () => {
            renderAreaOptions();
            loadLogs();
        }

async function exportToPDF(id) {
    const r = await pb.collection('handovers').getOne(id);

    // Xử lý khung giờ Ca
    let caTime = '';
    const startDate = new Date(r.date);
    let endDate = new Date(r.date);
    if (r.shift === 'Ca 1') {
        caTime = `Từ 06 giờ 00 ngày ${startDate.toLocaleDateString('vi-VN')} đến 14 giờ 00 ngày ${startDate.toLocaleDateString('vi-VN')}`;
    } else if (r.shift === 'Ca 2') {
        caTime = `Từ 14 giờ 00 ngày ${startDate.toLocaleDateString('vi-VN')} đến 22 giờ 00 ngày ${startDate.toLocaleDateString('vi-VN')}`;
    } else if (r.shift === 'Ca 3') {
        endDate.setDate(endDate.getDate() + 1);
        caTime = `Từ 22 giờ 00 ngày ${startDate.toLocaleDateString('vi-VN')} đến 06 giờ 00 ngày ${endDate.toLocaleDateString('vi-VN')}`;
    }

    const dateStr = new Date(r.date).toLocaleDateString('vi-VN', { day: '2-digit', month: '2-digit', year: 'numeric' });

    // Giới hạn tối đa 10 hàng cho bảng tình hình trong ca
    const situations = (r.situations || []).slice(0, 10); // Chỉ lấy tối đa 10 hàng

    // Tạo nội dung PDF
    const contentHTML = `
        <div style="font-family: 'Times New Roman', Times, serif; font-size: 13px; line-height: 1; padding: 0px 0px 0px 0px; width: 595px; margin: 0 auto; background: white;">
            <!-- Dòng Ca trực tiếp -->
            <p style="text-align: center; margin: 0 0 18px 0; font-weight: bold;">
                ${r.shift} ${caTime}
            </p>

            <!-- NHÂN VIÊN VẬN HÀNH -->
            <p style="margin: 20px 0 8px 0; font-weight: bold;">
                NHÂN VIÊN VẬN HÀNH CÁC ĐƠN VỊ (ghi rõ họ tên)
            </p>
            <table style="width:100%; border-collapse: collapse; margin-bottom: 25px;">
                <tr>
                    <td style="border:1px solid #000; padding:8px; text-align:center; font-weight:bold;"></td>
                    <td style="border:1px solid #000; padding:8px; text-align:center; font-weight:bold;">Trực đội QLVH</td>
                    <td style="border:1px solid #000; padding:8px; text-align:center; font-weight:bold;">Trực điều độ điện lực</td>
                </tr>
                <tr>
                    <td style="border:1px solid #000; padding:8px; text-align:center;">Trực chính</td>
                    <td style="border:1px solid #000; padding:8px; text-align:center;">${r.main_duty || ''}</td>
                    <td style="border:1px solid #000; padding:8px; text-align:center;">${r.main_power || ''}</td>
                </tr>
                <tr>
                    <td style="border:1px solid #000; padding:8px; text-align:center;">Trực phụ</td>
                    <td style="border:1px solid #000; padding:8px; text-align:center;">${r.sub_duty || ''}</td>
                    <td style="border:1px solid #000; padding:8px; text-align:center;">${r.sub_power || ''}</td>
                </tr>
            </table>

            <!-- I. TÌNH HÌNH VẬN HÀNH TRONG CA - Luôn 10 hàng -->
            <p style="margin: 25px 0 8px 0; font-weight: bold;">
                I. TÌNH HÌNH VẬN HÀNH TRONG CA (Tóm tắt diễn biến chính trong ca)
            </p>
            <table style="width:100%; border-collapse: collapse; margin-bottom: 25px;">
                <thead>
                    <tr style="background:#ffffff;">
                        <th style="border:1px solid #000; padding:5px; text-align:left; width:25%;">Thời gian</th>
                        <th style="border:1px solid #000; padding:5px; text-align:left;">Nội dung</th>
                    </tr>
                </thead>
                <tbody>
                    ${Array(10).fill(0).map((_, i) => {
                        const s = situations[i];
                        return `
                        <tr>
                            <td style="border:1px solid #000; padding:5px;">${s ? s.time || '' : '...'}</td>
                            <td style="border:1px solid #000; padding:5px;">${s ? s.content || '' : '...'}</td>
                        </tr>`;
                    }).join('')}
                </tbody>
            </table>

            <!-- II. PHẦN GIAO NHẬN CA -->
            <p style="margin: 25px 0 8px 0; font-weight: bold;">II. PHẦN GIAO NHẬN CA</p>
            <p><strong>1. Những lưu ý và tồn tại ca sau cần giải quyết:</strong><br>${r.notes || 'Không có'}</p>
            <p style="margin-top: 15px;"><strong>2. Trang bị vận hành, thông tin liên lạc, vệ sinh công nghiệp:</strong><br>${r.equipment || 'Không có'}</p>

            <table style="width:100%; border-collapse: collapse; margin: 25px 0;">
                <tr>
                    <td style="border:1px solid #000; padding:8px; text-align:center; font-weight:bold;">Giờ giao ca</td>
                    <td style="border:1px solid #000; padding:8px; text-align:center; font-weight:bold;">Người nhận ca ký</td>
                    <td style="border:1px solid #000; padding:8px; text-align:center; font-weight:bold;">Người giao ca ký</td>
                </tr>
				<tr>
        			<td rowspan="2" style="border:1px solid #000; padding:8px; text-align:center; width:33%;"></td>
        			<td style="border:1px solid #000; padding: 8px; text-align:center;"></td>
        			<td style="border:1px solid #000; padding: 8px; text-align:center;"></td>
    			</tr>
                <tr>
                    <td style="border:1px solid #000; padding:8px;"></td>
                    <td style="border:1px solid #000; padding:8px;"></td>
                </tr>
            </table>

            <p style="margin-top: 25px;"><strong>3. Ý kiến lãnh đạo đơn vị:</strong><br>${r.opinions || 'Không có'}</p>
        </div>`;

    // Tạo PDF
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF('p', 'mm', 'a4');

    const tempDiv = document.createElement('div');
    tempDiv.style.width = '595px';
    tempDiv.innerHTML = contentHTML;
    document.body.appendChild(tempDiv);

    html2canvas(tempDiv, { scale: 3.5 }).then(canvas => {
        const imgData = canvas.toDataURL('image/png');
        const pageWidth = 190;
        const pageHeight = (canvas.height * pageWidth) / canvas.width;
        
        pdf.addImage(imgData, 'PNG', 30, 20, pageWidth, pageHeight);
        pdf.save(`SoTruc_${r.area || 'KCN'}_${r.shift}_${dateStr}.pdf`);
        
        document.body.removeChild(tempDiv);
    });
};

    </script>
