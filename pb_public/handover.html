<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sổ nhật ký vận hành điện tử</title>
  <script src="https://cdn.jsdelivr.net/npm/pocketbase@0.21.3/dist/pocketbase.umd.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <style>
    :root {
      --card-tienhai:    #f0fdf4 #16a34a;
      --card-phongdien:  #eff6ff #3b82f6;
      --card-thuanthanh: #fefce8 #f59e0b;
      --card-yenmy:      #fef2f2 #ef4444;
      --card-kcn3:       #f5f3ff #8b5cf6;
    }

    .entry-card {
      transition: all 0.2s ease;
      border: 2px solid transparent;
    }
    .entry-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
    }

    /* Tự động màu theo khu vực – dùng css variable */
    .card-KCN-Tiền-Hải       { background: var(--card-tienhai);    }
    .card-KCN-Phong-Điền     { background: var(--card-phongdien);  }
    .card-KCN-Thuận-Thành-I  { background: var(--card-thuanthanh); }
    .card-KCN-Yên-Mỹ         { background: var(--card-yenmy);      }
    .card-KCN-Số-3           { background: var(--card-kcn3);       }

    .kcn-KCN-Tiền-Hải       { @apply bg-green-100 text-green-800; }
    .kcn-KCN-Phong-Điền     { @apply bg-blue-100  text-blue-800;  }
    .kcn-KCN-Thuận-Thành-I  { @apply bg-yellow-100 text-yellow-800;}
    .kcn-KCN-Yên-Mỹ         { @apply bg-red-100   text-red-800;   }
    .kcn-KCN-Số-3           { @apply bg-purple-100 text-purple-800;}

    .scroll-list {
      max-height: calc(100vh - 420px);
      overflow-y: auto;
      scrollbar-width: thin;
    }
    .scroll-list::-webkit-scrollbar {
      width: 6px;
    }
    .scroll-list::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 3px;
    }
  </style>
</head>
<body class="bg-gray-50 min-h-screen text-gray-900">

  <div class="max-w-7xl mx-auto p-5 md:p-8">

    <!-- Header -->
    <header class="flex flex-col sm:flex-row justify-between items-center gap-4 mb-8 bg-white shadow rounded-3xl p-6">
      <h1 class="text-3xl md:text-4xl font-bold text-gray-800 flex items-center gap-3">
        <i class="fas fa-clipboard-list text-emerald-600"></i>
        Sổ nhật ký vận hành điện tử
      </h1>
      <div class="flex gap-4">
        <button onclick="refreshList()" class="bg-gray-200 hover:bg-gray-300 px-6 py-3 rounded-2xl flex items-center gap-2">
          <i class="fas fa-sync-alt"></i> Refresh
        </button>
        <button onclick="logout()" class="bg-red-600 hover:bg-red-700 text-white px-6 py-3 rounded-2xl flex items-center gap-2">
          <i class="fas fa-sign-out-alt"></i> Đăng xuất
        </button>
      </div>
    </header>

    <!-- Filter + Add -->
    <div class="bg-white shadow rounded-3xl p-6 md:p-8 mb-8">
      <div class="flex flex-col md:flex-row md:items-end gap-6">
        <button onclick="openCreateModal()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-8 py-4 rounded-3xl text-lg font-medium flex items-center gap-3 shadow-md">
          <i class="fas fa-plus"></i> Thêm lịch trực mới
        </button>

        <div class="flex-1 grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label class="block text-sm text-gray-600 mb-2 font-medium">Khu vực</label>
            <select id="filterArea" onchange="applyFilter()" class="w-full bg-gray-100 border border-gray-300 p-4 rounded-2xl text-lg">
              <option value="">Tất cả khu vực</option>
            </select>
          </div>
          <div>
            <label class="block text-sm text-gray-600 mb-2 font-medium">Ngày</label>
            <input type="date" id="filterDate" onchange="applyFilter()" class="w-full bg-gray-100 border border-gray-300 p-4 rounded-2xl text-lg">
          </div>
        </div>
      </div>
    </div>

    <!-- Danh sách -->
    <div id="logs" class="scroll-list space-y-4"></div>
  </div>

  <!-- Modal Chi tiết -->
  <div id="detailModal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-3xl w-full max-w-4xl max-h-[96vh] overflow-auto shadow-2xl">
      <div class="sticky top-0 bg-white p-6 border-b flex justify-between items-center z-10">
        <h3 class="text-2xl font-bold text-gray-800">Chi tiết lịch trực</h3>
        <button onclick="closeDetailModal()" class="text-3xl text-gray-500 hover:text-gray-800">×</button>
      </div>
      <div id="detailContent" class="p-6 md:p-8"></div>
    </div>
  </div>

  <!-- Modal Tạo/Sửa -->
  <div id="modal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-3xl w-full max-w-4xl max-h-[96vh] overflow-auto shadow-2xl">
      <div class="sticky top-0 bg-white p-6 border-b flex justify-between items-center z-10">
        <h3 id="modalTitle" class="text-2xl font-bold text-gray-800">✍️ Tạo lịch trực mới</h3>
        <button onclick="closeModal()" class="text-3xl text-gray-500 hover:text-gray-800">×</button>
      </div>

      <div class="p-6 md:p-8 space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
          <div>
            <label class="block text-sm text-gray-600 mb-2">Ngày</label>
            <input id="date" type="date" required class="w-full p-4 bg-gray-50 border rounded-2xl">
          </div>
          <div>
            <label class="block text-sm text-gray-600 mb-2">Khu vực</label>
            <select id="area" required class="w-full p-4 bg-gray-50 border rounded-2xl"></select>
          </div>
          <div>
            <label class="block text-sm text-gray-600 mb-2">Ca trực</label>
            <select id="shift" class="w-full p-4 bg-gray-50 border rounded-2xl">
              <option value="Ca 1">Ca 1 (06:00 – 14:00)</option>
              <option value="Ca 2">Ca 2 (14:00 – 22:00)</option>
              <option value="Ca 3">Ca 3 (22:00 – 06:00)</option>
            </select>
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
          <input id="main_duty"    placeholder="Trực chính"           class="w-full p-4 bg-gray-50 border rounded-2xl">
          <input id="sub_duty"     placeholder="Trực phụ"             class="w-full p-4 bg-gray-50 border rounded-2xl">
          <input id="main_power"   placeholder="Trực chính điện lực"  class="w-full p-4 bg-gray-50 border rounded-2xl">
          <input id="sub_power"    placeholder="Trực phụ điện lực"    class="w-full p-4 bg-gray-50 border rounded-2xl">
        </div>

        <textarea id="notes"     placeholder="1. Lưu ý & tồn tại ca sau cần giải quyết" rows="3" class="w-full p-5 bg-gray-50 border rounded-3xl"></textarea>
        <textarea id="equipment" placeholder="2. Trang bị, thông tin liên lạc, vệ sinh công nghiệp" rows="3" class="w-full p-5 bg-gray-50 border rounded-3xl"></textarea>
        <textarea id="opinions"  placeholder="3. Ý kiến lãnh đạo đơn vị" rows="3" class="w-full p-5 bg-gray-50 border rounded-3xl"></textarea>

        <div>
          <div class="flex justify-between items-center mb-3">
            <h4 class="font-semibold text-gray-700">Tình hình trong ca</h4>
            <button type="button" onclick="addSituationRow()" class="text-emerald-600 hover:text-emerald-800 text-sm font-medium flex items-center gap-1">
              <i class="fas fa-plus"></i> Thêm dòng
            </button>
          </div>
          <table class="w-full text-sm border-collapse">
            <thead class="bg-gray-100">
              <tr><th class="p-3 text-left">Thời gian</th><th class="p-3 text-left">Nội dung</th><th class="w-12"></th></tr>
            </thead>
            <tbody id="situationBody"></tbody>
          </table>
        </div>

        <div class="flex gap-4 mt-10">
          <button onclick="closeModal()" class="flex-1 bg-gray-300 hover:bg-gray-400 py-5 rounded-3xl font-medium">Hủy</button>
          <button onclick="saveLog()" id="saveBtn" class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white py-5 rounded-3xl font-medium">Lưu</button>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
