<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Handover Log - Nhật Ký Bàn Giao Ca</title>
    <script src="https://cdn.jsdelivr.net/npm/pocketbase@0.21.3/dist/pocketbase.umd.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .priority-dot { width: 14px; height: 14px; border-radius: 50%; }
        .green { background: #10b981; }
        .yellow { background: #eab308; }
        .blue { background: #3b82f6; }
        .red { background: #ef4444; }
        .entry-card { transition: all 0.3s ease; }
        .entry-card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.3); }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen">
    <div class="max-w-6xl mx-auto p-6">
        <div class="flex justify-between items-center mb-10 bg-slate-900 p-6 rounded-3xl">
            <h1 class="text-4xl font-bold">📋 Handover Log</h1>
            <button onclick="logout()" class="bg-red-600 hover:bg-red-700 px-8 py-3 rounded-2xl font-medium text-sm">Đăng xuất</button>
        </div>

        <!-- Form tạo mới -->
        <div class="bg-slate-900 p-8 rounded-3xl mb-10">
            <h2 class="text-2xl font-semibold mb-6">✍️ Tạo bàn giao ca mới</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <input id="title" placeholder="Tiêu đề ca..." class="bg-slate-800 p-4 rounded-2xl text-lg">
                <select id="shift" class="bg-slate-800 p-4 rounded-2xl text-lg">
                    <option value="Ca 1">Ca 1</option>
                    <option value="Ca 2">Ca 2</option>
                    <option value="Ca 3">Ca 3</option>
                </select>
                <select id="priority" class="bg-slate-800 p-4 rounded-2xl text-lg">
                    <option value="green">🟢 Bình thường</option>
                    <option value="yellow">🟡 Cảnh báo</option>
                    <option value="blue">🔵 Quan trọng</option>
                    <option value="red">🔴 Khẩn cấp</option>
                </select>
            </div>
            <textarea id="content" rows="6" placeholder="Nội dung bàn giao chi tiết..." class="w-full mt-6 bg-slate-800 p-6 rounded-3xl text-lg"></textarea>
            <button onclick="createLog()" class="w-full mt-6 bg-emerald-600 hover:bg-emerald-700 py-5 rounded-3xl text-xl font-medium">📤 Đăng bàn giao ngay</button>
        </div>

        <!-- Danh sách -->
        <div id="logs" class="space-y-8"></div>
    </div>

    <!-- Modal Chỉnh sửa -->
    <div id="editModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
        <div class="bg-slate-900 p-8 rounded-3xl w-full max-w-2xl mx-4">
            <h3 class="text-2xl font-bold mb-6">✏️ Chỉnh sửa bàn giao</h3>
            <input id="editTitle" class="w-full bg-slate-800 p-4 rounded-2xl mb-4 text-lg">
            <textarea id="editContent" rows="6" class="w-full bg-slate-800 p-6 rounded-3xl mb-6"></textarea>
            <div class="flex gap-4">
                <button onclick="closeModal()" class="flex-1 bg-slate-700 hover:bg-slate-600 py-4 rounded-2xl">Hủy</button>
                <button onclick="saveEdit()" class="flex-1 bg-emerald-600 hover:bg-emerald-700 py-4 rounded-2xl font-medium">Lưu thay đổi</button>
            </div>
        </div>
    </div>

    <script>
        const pb = new PocketBase('https://shared-diary-pocketbase-production.up.railway.app');
        let currentEditId = null;

        if (!pb.authStore.isValid) window.location.href = '/';

        // Realtime
        pb.collection('entries').subscribe('*', () => loadLogs());

        async function createLog() {
            await pb.collection('entries').create({
                title: document.getElementById('title').value || 'Bàn giao ca',
                shift: document.getElementById('shift').value,
                priority: document.getElementById('priority').value,
                content: document.getElementById('content').value
            });
            alert('✅ Đã đăng!');
            document.getElementById('title').value = '';
            document.getElementById('content').value = '';
            loadLogs();
        }

        async function loadLogs() {
            const records = await pb.collection('entries').getFullList({ sort: '-created' });
            let html = '';
            records.forEach(r => {
                const color = r.priority || 'green';
                html += `
                <div class="entry-card bg-slate-900 p-8 rounded-3xl border-l-8 border-${color}-500" data-id="${r.id}">
                    <div class="flex justify-between mb-4">
                        <div class="flex items-center gap-4">
                            <span class="priority-dot ${color}"></span>
                            <span class="font-bold">${r.shift}</span>
                            <span class="text-emerald-400">${r.title}</span>
                        </div>
                        <div class="text-xs text-slate-400">${new Date(r.created).toLocaleString('vi-VN')}</div>
                    </div>
                    <p class="text-slate-300 text-lg">${r.content.replace(/\n/g, '<br>')}</p>
                    <div class="flex gap-4 mt-6">
                        <button class="edit-btn text-blue-400 hover:text-blue-300 font-medium">✏️ Sửa</button>
                        <button class="delete-btn text-red-400 hover:text-red-300 font-medium">🗑️ Xóa</button>
                    </div>
                </div>`;
            });
            document.getElementById('logs').innerHTML = html || '<p class="text-center py-20 text-slate-400">Chưa có bàn giao nào...</p>';

            // Gắn sự kiện cho nút Sửa & Xóa
            document.querySelectorAll('.edit-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const card = this.closest('.entry-card');
                    editLog(card.dataset.id);
                });
            });
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const card = this.closest('.entry-card');
                    deleteLog(card.dataset.id);
                });
            });
        }

        function editLog(id) {
            currentEditId = id;
            pb.collection('entries').getOne(id).then(r => {
                document.getElementById('editTitle').value = r.title || '';
                document.getElementById('editContent').value = r.content || '';
                document.getElementById('editModal').classList.remove('hidden');
            });
        }

        async function saveEdit() {
            await pb.collection('entries').update(currentEditId, {
                title: document.getElementById('editTitle').value,
                content: document.getElementById('editContent').value
            });
            closeModal();
            loadLogs();
            alert('✅ Đã lưu thay đổi!');
        }

        function closeModal() {
            document.getElementById('editModal').classList.add('hidden');
        }

        async function deleteLog(id) {
            if (confirm('Xác nhận xóa bản ghi này?')) {
                await pb.collection('entries').delete(id);
                loadLogs();
                alert('🗑️ Đã xóa!');
            }
        }

        function logout() {
            pb.collection('entries').unsubscribe();
            pb.authStore.clear();
            window.location.href = '/';
        }

        window.onload = loadLogs;
    </script>
</body>
</html>
